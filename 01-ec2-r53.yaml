- name: create ec2 and r53
  hosts:  localhost
  connection: local
  vars:
    ami_id: ami-0220d79f3f480ecf5 
    sg_id:  sg-096cdc6ca04cabef9
    zone_id:  Z0948150OFPSYTNVYZOY
    domain_name:  "slvcs.online"
    instances:
    - mongodb
    - rabbitmq
    - Node2
  tasks:
  - name: create ec2 and r53
    amazon.aws.ec2_instance:
      name: "{{ item }}"
      instance_type:  t3.micro
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id }}"
      tags:
        Name: "{{ item }}"
    loop: "{{ instances }}"
    register: ec2_output

  - name: print the ec2_output
    ansible.builtin.debug:
      msg:  "{{ ec2_output }}"

  - name: print public_ip
    ansible.builtin.debug:  
      msg:  "{{ item.instances[0].public_ip_address }}"
    loop: "{{ ec2_output.results }}"

  - name: print private_ip_address
    ansible.builtin.debug:  
      msg:  "{{ item.instances[0].private_ip_address}}"
    loop: "{{ ec2_output.results }}"

  - name: Create route53 record
    amazon.aws.route53:
      state:  present
      zone: "{{ domain_name }}"
      record: "{{ item.item }}.{{ domain_name }}"
      type: A 
      ttl: 1
      value:  "{{ item.instances[0].private_ip_address }}"
    loop: "{{ ec2_output.results }}"


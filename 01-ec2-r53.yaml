- name: create ec2 and r53
  hosts:  frontend
  vars:
    ami_id:  ami-09c813fb71547fc4f
    sg_id:  sg-096cdc6ca04cabef9
    zone_id:  Z0948150OFPSYTNVYZOY
    domain_name:  "slvcs.online"
    instances:
    - mongodb
  tasks:
  - name: create ec2 and r53
    amazon.aws.ec2_instance:
      name: "{{ item }}"
      instance_type:  t3.micro
      security_group: "{{ sg_id }}"
      image_id: "{{ ami_id }}"
      tags:
        Name: "{{ item }}"
    loop: "{{ instances }}"
    register: ec2_output

  - name: print the ec2_output
    ansible.builtin.debug:
      msg:  "{{ ec2_output }}"